<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        width: 600px;
        height: 600px;
        margin: 100px auto;
        border: 1px solid red;
      }

      .fs-virtuallist-container {
        width: 100%;
        height: 100%;
        overflow-y: auto;
      }

      .fs-virtuallist-list {
        width: 100%;
      }

      .fs-virtuallist-item {
        width: 100%;
        height: 100px;
        box-sizing: border-box;
        border: 1px solid #000;
        text-align: center;
        font-size: 20px;
        line-height: 100px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="fs-virtuallist-container">
        <div class="fs-virtuallist-list">
          <!-- <div class="fs-virtuallist-item"></div> -->
        </div>
      </div>
    </div>
    <script>
      class FsVirtuallist {
        constructor(containerSelector, listSelector) {
          this.state = {
            dataSource: [], // 模拟数据源
            itemHeight: 100, // 固定 item 高度
            viewHeight: 0, // container 高度
            maxCount: 0, // 虚拟列表视图最大容纳量
          };
          this.scrollStyle = {}; // list 动态样式（高度，偏移）
          this.startIndex = 0; // 当前视图列表在数据源中的起始索引
          this.endIndex = 0; // 当前视图列表在数据源中的末尾索引
          this.renderList = []; // 渲染在视图上的列表项
          // 根据用户传入的选择器获取 DOM 并保存
          this.oContainer = document.querySelector(containerSelector);// 虚拟列表容器
          this.oList = document.querySelector(listSelector);// 虚拟列表项容器
        }

        init() {
          this.state.viewHeight = this.oContainer.offsetHeight;
          this.state.maxCount =
            Math.ceil(this.state.viewHeight / this.state.itemHeight) + 1;
          this.bindEvent();
          this.addData();
          this.render();
        }

        bindEvent() {
          this.oContainer.addEventListener(
            "scroll",
            this.rafThrottle(this.handleScroll.bind(this)),
          );
        }

        computedEndIndex() {
          const end = this.startIndex + this.state.maxCount;// 计算当前视图列表在数据源中的末尾索引
          this.endIndex = this.state.dataSource[end]
            ? end
            : this.state.dataSource.length;// 如果末尾索引超出数据源长度，将末尾索引设为数据源长度
          if (this.endIndex >= this.state.dataSource.length) {// 如果末尾索引超出数据源长度，添加数据
            this.addData();
          }
        }

        computedRenderList() {// 计算当前视图列表在数据源中的渲染列表
          this.renderList = this.state.dataSource.slice(
            this.startIndex,
            this.endIndex,
          );
        }

        computedScrollStyle() {// 计算当前视图列表在数据源中的滚动样式
          const { dataSource, itemHeight } = this.state;
          this.scrollStyle = {
            height: `${dataSource.length * itemHeight - this.startIndex * itemHeight}px`,
            transform: `translate3d(0, ${this.startIndex * itemHeight}px, 0)`,// 计算当前视图列表在数据源中的滚动偏移
          };
        }

        handleScroll() {
          const { scrollTop } = this.oContainer;
          this.startIndex = Math.floor(scrollTop / this.state.itemHeight);// 计算当前视图列表在数据源中的起始索引
          if (this.startIndex !== this.lastStart) this.render();// 如果起始索引发生变化，重新渲染
          this.lastStart = this.startIndex;// 记录当前起始索引
        }

        render() {
          this.computedEndIndex();
          this.computedRenderList();
          this.computedScrollStyle();
          const template = this.renderList
            .map((i) => `<div class="fs-virtuallist-item">${i}</div>`)
            .join("");
          const { height, transform } = this.scrollStyle;
          this.oList.innerHTML = template;
          this.oList.style.height = height;
          this.oList.style.transform = transform;
        }

        addData() {
          for (let i = 0; i < 10; i++) {
            this.state.dataSource.push(this.state.dataSource.length + 1);
          }
        }

        rafThrottle(fn) {
          let lock = false;
          return function (...args) {
            window.requestAnimationFrame(() => {
              if (lock) return;
              lock = true;
              fn.apply(this, args);
              lock = false;
            });
          };
        }
      }

      const vList = new FsVirtuallist(
        ".fs-virtuallist-container",
        ".fs-virtuallist-list",
      );
      vList.init();
    </script>
  </body>
</html>
